name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: extractions/setup-just@v2

      - name: Install BPF build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang llvm libbpf-dev

      - name: Vet
        run: just vet

      - name: Test
        run: just test

      - name: Build
        run: just build
